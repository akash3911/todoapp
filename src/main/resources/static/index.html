<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Manager</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<main class="app-shell">
    <section class="hero">
        <p class="eyebrow">Todo Management System</p>
        <h1>Simple task tracker</h1>
        <p class="subtext">Create tasks, update their status, and keep everything in one clean place.</p>
    </section>

    <section class="panel">
        <form id="taskForm" class="task-form">
            <input type="hidden" id="taskId">
            <label>
                Title
                <input type="text" id="title" placeholder="Enter task title" required>
            </label>
            <label>
                Description
                <textarea id="description" rows="3" placeholder="Optional details"></textarea>
            </label>
            <label>
                Status
                <select id="status">
                    <option value="PENDING">Pending</option>
                    <option value="IN_PROGRESS">In Progress</option>
                    <option value="COMPLETED">Completed</option>
                </select>
            </label>
            <div class="form-actions">
                <button type="submit" class="primary">Save Task</button>
                <button type="button" id="resetButton" class="secondary">Clear</button>
            </div>
        </form>
    </section>

    <section class="panel">
        <div class="list-header">
            <h2>Tasks</h2>
            <select id="filterStatus">
                <option value="">All</option>
                <option value="PENDING">Pending</option>
                <option value="IN_PROGRESS">In Progress</option>
                <option value="COMPLETED">Completed</option>
            </select>
        </div>
        <div id="taskList" class="task-list"></div>
    </section>
</main>

<script src="app.js"></script>
</body>
</html>
